services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salondesk-app
    restart: unless-stopped
    ports:
      - "3012:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SALONDESK_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      ZALO_RUNTIME_DIR: /app/data-runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
      - zalo_runtime:/app/data-runtime
    deploy:
      resources:
        limits:
          memory: 2G

  db:
    image: postgres:16-alpine
    container_name: salondesk-db
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salondesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d salondesk"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  whatsapp_auth:
  zalo_runtime:
